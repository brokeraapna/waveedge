<!-- Add this script to your fil.html -->
<script>
async function loadFIIData() {
    try {
        const response = await fetch('/api/fii-data');
        const result = await response.json();
        
        if (result.success) {
            const data = result.data;
            // Update your FII table with data
            document.getElementById('fii-table').innerHTML = renderFIITable(data);
        } else {
            console.error('Failed to load FII data:', result.error);
            // Show fallback message
            document.getElementById('fii-table').innerHTML = 
                '<tr><td colspan="3">FII data temporarily unavailable. Please check later.</td></tr>';
        }
    } catch (error) {
        console.error('Error:', error);
    }
}

function renderFIITable(data) {
    // Implement based on NSE API response structure
    let html = '';
    if (data.cash) {
        html += `<tr>
            <td>Cash Market</td>
            <td>${data.cash.fii_buy || 0}</td>
            <td>${data.cash.fii_sell || 0}</td>
            <td>${data.cash.fii_net || 0}</td>
        </tr>`;
    }
    return html;
}

// Load on page load
document.addEventListener('DOMContentLoaded', loadFIIData);
</script>
