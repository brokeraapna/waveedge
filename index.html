<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WaveEdge</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #020c14;
      color: #dff0f8;
      font-family: Arial, sans-serif;
    }

    /* NAVBAR */
    .navbar {
      height: 70px;
      background: #061525;
      border-bottom: 1px solid #173348;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
      color: #00e5ff;
    }

    .menu {
      display: flex;
      gap: 20px;
    }

    .menu button {
      background: none;
      border: none;
      color: #4d8099;
      cursor: pointer;
      font-size: 14px;
    }

    .menu button:hover {
      color: #00e5ff;
    }

    .menu button.active {
      color: #00e5ff;
    }

    /* PAGES */
    .page {
      display: none;
      padding: 40px;
    }

    .page.active {
      display: block;
    }

    /* TOOLS IFRAME */
    .tools-frame {
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">⚡ WaveEdge</div>

    <div class="menu">
      <button onclick="showPage('home')" id="nav-home" class="active">Home</button>
      <button onclick="showPage('tools')" id="nav-tools">Tools</button>
    </div>
  </div>

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <h1>Welcome to WaveEdge 🚀</h1>
    <p>Your AI-powered trading tools platform.</p>
  </div>

  <!-- TOOLS PAGE (FIXED) -->
  <div class="page" id="page-tools">
    
    <!-- ✅ THIS IS THE FIX -->
    <iframe 
      src="/tools.html" 
      class="tools-frame">
    </iframe>

  </div>

  <!-- SCRIPT -->
  <script>
    function showPage(page) {
      // hide all pages
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

      // remove active from nav
      document.querySelectorAll(".menu button").forEach(b => b.classList.remove("active"));

      // show selected
      document.getElementById("page-" + page).classList.add("active");
      document.getElementById("nav-" + page).classList.add("active");
    }
  </script>

</body>
</html>
