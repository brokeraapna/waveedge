<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WaveEdge - NSE Live</title>
<style>body{background:#1a1a1a;color:white;font-family:Arial;} 
h2{color:#4CAF50;} .stock-box{padding:15px;margin:10px;background:#2a2a2a;border-radius:5px;}</style>
</head>
<body>
<center>
<h1>🇮🇳 WaveEdge Live NSE Tracker</h1>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px;">

<!-- NSE STOCK 1 -->
<div class="stock-box">
<h3>Reliance Industries</h3>
<div id="reliance">-</div>
</div>

<!-- NSE STOCK 2 -->
<div class="stock-box">
<h3>Tata Motors</h3>
<div id="tata">-</div>
</div>

<!-- ADD MORE STOCKS BY COPYING ABOVE -->

</div>

<script>
const API_KEY = 'demo'; // Get from alphavantage.co

async function updateNSE(symbol, elementId, name) {
  try {
    const data = await (await fetch(
      https://api.allorigins.win/raw?url=${encodeURIComponent(
        https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}.NS&apikey=${API_KEY}
      )}
    )).json();
    
    const quote = data['Global Quote'];
    document.getElementById(elementId).innerHTML = 
      <h2 style="margin:0;">${name}</h2>
      <h1 style="color:#00ff00;font-size:24px;">₹${quote['05. price']}</h1>
      <p>${quote['09. change']} (${quote['10. change percent']})</p>
      <small>${new Date().toLocaleTimeString()} IST</small>
    ;
  } catch(e) {
    document.getElementById(elementId).innerHTML = '<p style="color:red;">Connection Error</p>';
  }
}

// Update every 2 minutes
setInterval(() => {
  updateNSE('RELIANCE', 'reliance', 'Reliance Industries');
  updateNSE('TATAMOTORS', 'tata', 'Tata Motors');
}, 120000);

// Load immediately
updateNSE('RELIANCE', 'reliance', 'Reliance Industries');
updateNSE('TATAMOTORS', 'tata', 'Tata Motors');

</script>
</center>
</body>
</html>
