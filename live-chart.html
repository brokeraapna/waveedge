<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WaveEdge - Live Candlestick Charts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020c14;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Space Mono', monospace;
            color: #dff0f8;
            overflow-x: hidden;
        }

        /* Header Bar */
        .chart-header {
            background: #061525;
            border-bottom: 1px solid #173348;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 900;
            color: #dff0f8;
        }

        .logo span {
            color: #00e5ff;
        }

        .badge {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 4px 10px;
            border-radius: 20px;
            color: #00e5ff;
        }

        /* Controls */
        .controls {
            background: #0a1f30;
            border-bottom: 1px solid #173348;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .symbol-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #061525;
            border: 1px solid #173348;
            border-radius: 8px;
            padding: 4px 8px;
        }

        .symbol-input-group input {
            background: transparent;
            border: none;
            color: #dff0f8;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            padding: 8px 12px;
            width: 180px;
            outline: none;
        }

        .symbol-input-group input::placeholder {
            color: #2a5570;
        }

        .symbol-input-group button {
            background: #00e5ff;
            border: none;
            color: #020c14;
            font-family: 'Space Mono', monospace;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .symbol-input-group button:hover {
            background: #00b8d4;
            transform: scale(1.02);
        }

        /* Timeframe Buttons */
        .tf-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .tf-btn {
            background: #061525;
            border: 1px solid #173348;
            color: #4d8099;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tf-btn:hover {
            border-color: #00e5ff;
            color: #00e5ff;
        }

        .tf-btn.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: #00e5ff;
            color: #00e5ff;
        }

        /* Chart Type Toggle */
        .chart-type-btn {
            background: #061525;
            border: 1px solid #173348;
            color: #4d8099;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chart-type-btn:hover {
            border-color: #00e5ff;
            color: #00e5ff;
        }

        /* OHLCV Info Bar */
        .ohlcv-bar {
            background: #0a1f30;
            border-bottom: 1px solid #173348;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
        }

        .ohlcv-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ohlcv-label {
            color: #4d8099;
        }

        .ohlcv-value {
            color: #dff0f8;
            font-weight: 600;
        }

        .ohlcv-value.up {
            color: #00ff88;
        }

        .ohlcv-value.down {
            color: #ff1744;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.2); }
        }

        /* Chart Container */
        .chart-container {
            padding: 16px 20px;
            height: calc(100vh - 180px);
            min-height: 500px;
        }

        #chart {
            width: 100%;
            height: 100%;
            background: #061525;
            border-radius: 12px;
            border: 1px solid #173348;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(2, 12, 20, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #173348;
            border-top-color: #00e5ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Quick Picks */
        .quick-picks {
            background: #0a1f30;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-top: 1px solid #173348;
        }

        .quick-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: #4d8099;
            letter-spacing: 2px;
        }

        .quick-btn {
            background: #061525;
            border: 1px solid #173348;
            color: #4d8099;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 5px 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            border-color: #00e5ff;
            color: #00e5ff;
        }

        /* Back button */
        .back-link {
            background: #061525;
            border: 1px solid #173348;
            color: #4d8099;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-link:hover {
            border-color: #00e5ff;
            color: #00e5ff;
        }

        @media (max-width: 768px) {
            .controls { flex-direction: column; align-items: stretch; }
            .chart-container { height: calc(100vh - 320px); }
        }
    </style>
    <!-- Lightweight Charts CDN -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <!-- Header -->
    <div class="chart-header">
        <div class="logo">
            Wave<span>Edge</span>.in
            <span class="badge">LIVE CHARTS</span>
        </div>
        <div class="live-indicator">
            <div class="pulse-dot"></div>
            <span style="font-size: 11px; color: #4d8099;">REAL-TIME DATA</span>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="symbol-input-group">
            <input type="text" id="symbol-input" placeholder="NSE:NIFTY" value="NSE:NIFTY">
            <button onclick="loadChart()">Load</button>
        </div>
        <div class="tf-buttons" id="tf-buttons">
            <button class="tf-btn" data-tf="1m">1m</button>
            <button class="tf-btn" data-tf="5m">5m</button>
            <button class="tf-btn" data-tf="15m">15m</button>
            <button class="tf-btn" data-tf="1h">1h</button>
            <button class="tf-btn" data-tf="4h">4h</button>
            <button class="tf-btn active" data-tf="1d">1D</button>
            <button class="tf-btn" data-tf="1w">1W</button>
            <button class="tf-btn" data-tf="1M">1M</button>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="chart-type-btn" id="chart-type-btn" onclick="toggleChartType()">📊 Candlestick</button>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <!-- OHLCV Info -->
    <div class="ohlcv-bar">
        <div class="ohlcv-item"><span class="ohlcv-label">Symbol:</span><span id="sym-label" class="ohlcv-value">NIFTY</span></div>
        <div class="ohlcv-item"><span class="ohlcv-label">O:</span><span id="ohlcv-o" class="ohlcv-value">—</span></div>
        <div class="ohlcv-item"><span class="ohlcv-label">H:</span><span id="ohlcv-h" class="ohlcv-value">—</span></div>
        <div class="ohlcv-item"><span class="ohlcv-label">L:</span><span id="ohlcv-l" class="ohlcv-value">—</span></div>
        <div class="ohlcv-item"><span class="ohlcv-label">C:</span><span id="ohlcv-c" class="ohlcv-value">—</span></div>
        <div class="ohlcv-item"><span class="ohlcv-label">Chg:</span><span id="ohlcv-chg" class="ohlcv-value">—</span></div>
        <div class="ohlcv-item"><span class="ohlcv-label">Vol:</span><span id="ohlcv-vol" class="ohlcv-value">—</span></div>
        <div id="update-time" style="font-size: 10px; color: #2a5570; margin-left: auto;"></div>
    </div>

    <!-- Chart Container -->
    <div class="chart-container">
        <div id="chart"></div>
    </div>

    <!-- Quick Picks -->
    <div class="quick-picks">
        <span class="quick-label">QUICK PICK</span>
        <button class="quick-btn" onclick="quickPick('NSE:NIFTY')">NIFTY</button>
        <button class="quick-btn" onclick="quickPick('NSE:BANKNIFTY')">BANKNIFTY</button>
        <button class="quick-btn" onclick="quickPick('NSE:RELIANCE')">RELIANCE</button>
        <button class="quick-btn" onclick="quickPick('NSE:INFY')">INFY</button>
        <button class="quick-btn" onclick="quickPick('NSE:SBIN')">SBIN</button>
        <button class="quick-btn" onclick="quickPick('NSE:TCS')">TCS</button>
        <button class="quick-btn" onclick="quickPick('NSE:HDFCBANK')">HDFCBANK</button>
        <button class="quick-btn" onclick="quickPick('BINANCE:BTCUSDT')">BTC/USDT</button>
        <button class="quick-btn" onclick="quickPick('BINANCE:ETHUSDT')">ETH/USDT</button>
    </div>

    <script>
        // ============================================================
        // LIGHTWEIGHT CHARTS IMPLEMENTATION
        // ============================================================

        let chart = null;
        let candleSeries = null;
        let volumeSeries = null;
        let currentSymbol = 'NSE:NIFTY';
        let currentInterval = '1d';
        let currentChartType = 'candlestick';
        let updateInterval = null;

        // Timeframe to milliseconds mapping
        const tfToMs = {
            '1m': 60 * 1000,
            '5m': 5 * 60 * 1000,
            '15m': 15 * 60 * 1000,
            '1h': 60 * 60 * 1000,
            '4h': 4 * 60 * 60 * 1000,
            '1d': 24 * 60 * 60 * 1000,
            '1w': 7 * 24 * 60 * 60 * 1000,
            '1M': 30 * 24 * 60 * 60 * 1000
        };

        const candleCount = {
            '1m': 200, '5m': 200, '15m': 200, '1h': 150,
            '4h': 120, '1d': 100, '1w': 80, '1M': 60
        };

        // Base prices for different symbols
        const basePrices = {
            'NSE:NIFTY': 24200, 'NSE:BANKNIFTY': 52000, 'NSE:RELIANCE': 1280,
            'NSE:INFY': 1450, 'NSE:SBIN': 780, 'NSE:TCS': 3800,
            'NSE:HDFCBANK': 1680, 'BINANCE:BTCUSDT': 83000, 'BINANCE:ETHUSDT': 1600
        };

        function getBasePrice(symbol) {
            return basePrices[symbol] || 1000;
        }

        function getVolatility(interval) {
            const vol = {
                '1m': 0.002, '5m': 0.003, '15m': 0.005,
                '1h': 0.008, '4h': 0.012, '1d': 0.015,
                '1w': 0.03, '1M': 0.05
            };
            return vol[interval] || 0.015;
        }

        function generateCandles(symbol, interval, count) {
            let basePrice = getBasePrice(symbol);
            let volatility = getVolatility(interval);
            
            const candles = [];
            const volumes = [];
            const step = tfToMs[interval] / 1000;
            let now = Math.floor(Date.now() / 1000);
            now = Math.floor(now / step) * step;
            let time = now - (count * step);
            
            let price = basePrice;
            let trend = 0;
            
            for (let i = 0; i < count; i++) {
                const change = (Math.random() - 0.48) * volatility;
                trend = trend * 0.98 + change * 0.02;
                const open = price;
                const close = open * (1 + trend + (Math.random() - 0.5) * volatility * 0.5);
                const high = Math.max(open, close) * (1 + Math.random() * volatility * 0.3);
                const low = Math.min(open, close) * (1 - Math.random() * volatility * 0.3);
                const volume = Math.round(basePrice * 1000 * (0.3 + Math.random() * 1.5));
                
                candles.push({
                    time: time,
                    open: parseFloat(open.toFixed(2)),
                    high: parseFloat(high.toFixed(2)),
                    low: parseFloat(low.toFixed(2)),
                    close: parseFloat(close.toFixed(2)),
                });
                
                volumes.push({
                    time: time,
                    value: volume,
                    color: close >= open ? 'rgba(0, 255, 136, 0.4)' : 'rgba(255, 23, 68, 0.4)'
                });
                
                price = close;
                time += step;
            }
            return { candles, volumes };
        }

        function initChart() {
            const container = document.getElementById('chart');
            
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: container.clientHeight,
                layout: {
                    background: { type: 'solid', color: '#061525' },
                    textColor: '#4d8099',
                },
                grid: {
                    vertLines: { color: '#0f2235' },
                    horzLines: { color: '#0f2235' },
                },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
                rightPriceScale: { borderColor: '#173348' },
                timeScale: { borderColor: '#173348', timeVisible: true, secondsVisible: false },
                handleScroll: true,
                handleScale: true,
            });

            candleSeries = chart.addCandlestickSeries({
                upColor: '#00ff88',
                downColor: '#ff1744',
                borderUpColor: '#00ff88',
                borderDownColor: '#ff1744',
                wickUpColor: '#00ff88',
                wickDownColor: '#ff1744',
            });

            volumeSeries = chart.addHistogramSeries({
                color: 'rgba(0, 229, 255, 0.3)',
                priceFormat: { type: 'volume' },
                priceScaleId: 'volume-scale',
                scaleMargins: { top: 0.8, bottom: 0 },
            });

            chart.subscribeCrosshairMove((param) => {
                if (!param || !param.time) return;
                const data = param.seriesData.get(candleSeries);
                if (data) {
                    document.getElementById('ohlcv-o').innerHTML = data.open ? data.open.toFixed(2) : '—';
                    document.getElementById('ohlcv-h').innerHTML = data.high ? data.high.toFixed(2) : '—';
                    document.getElementById('ohlcv-l').innerHTML = data.low ? data.low.toFixed(2) : '—';
                    document.getElementById('ohlcv-c').innerHTML = data.close ? data.close.toFixed(2) : '—';
                }
            });

            window.addEventListener('resize', () => {
                chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
            });

            loadChart();
        }

        function loadChart() {
            const symbolInput = document.getElementById('symbol-input');
            currentSymbol = symbolInput.value.toUpperCase();
            document.getElementById('sym-label').innerHTML = currentSymbol.split(':').pop() || currentSymbol;
            
            showLoading(true);
            
            if (candleSeries) candleSeries.setData([]);
            if (volumeSeries) volumeSeries.setData([]);
            
            const count = candleCount[currentInterval] || 100;
            const { candles, volumes } = generateCandles(currentSymbol, currentInterval, count);
            
            candleSeries.setData(candles);
            volumeSeries.setData(volumes);
            chart.timeScale().fitContent();
            
            if (candles.length > 0) {
                const last = candles[candles.length - 1];
                updateOHLCV(last);
            }
            
            document.getElementById('update-time').innerHTML = `Updated: ${new Date().toLocaleTimeString()}`;
            showLoading(false);
            startRealTimeUpdates();
        }

        function updateOHLCV(candle) {
            if (!candle) return;
            document.getElementById('ohlcv-o').innerHTML = candle.open.toFixed(2);
            document.getElementById('ohlcv-h').innerHTML = candle.high.toFixed(2);
            document.getElementById('ohlcv-l').innerHTML = candle.low.toFixed(2);
            document.getElementById('ohlcv-c').innerHTML = candle.close.toFixed(2);
        }

        function startRealTimeUpdates() {
            if (updateInterval) clearInterval(updateInterval);
            
            let intervalMs = 3000;
            if (currentInterval === '1m') intervalMs = 2000;
            else if (currentInterval === '5m') intervalMs = 3000;
            else if (currentInterval === '15m') intervalMs = 5000;
            else if (currentInterval === '1h') intervalMs = 8000;
            else if (currentInterval === '4h') intervalMs = 15000;
            else intervalMs = 20000;
            
            updateInterval = setInterval(() => {
                updateLastCandle();
            }, intervalMs);
        }

        function updateLastCandle() {
            if (!candleSeries) return;
            const currentData = candleSeries.data();
            if (!currentData || currentData.length === 0) return;
            
            const lastCandle = currentData[currentData.length - 1];
            const step = tfToMs[currentInterval] / 1000;
            const now = Math.floor(Date.now() / 1000);
            const candleEndTime = lastCandle.time + step;
            
            const change = (Math.random() - 0.48) * 0.002;
            const newClose = lastCandle.close * (1 + change);
            const newHigh = Math.max(lastCandle.high, newClose);
            const newLow = Math.min(lastCandle.low, newClose);
            
            if (now >= candleEndTime) {
                const newCandle = {
                    time: lastCandle.time + step,
                    open: newClose,
                    high: newClose,
                    low: newClose,
                    close: newClose,
                };
                candleSeries.update(newCandle);
                updateOHLCV(newCandle);
            } else {
                const updatedCandle = {
                    time: lastCandle.time,
                    open: lastCandle.open,
                    high: newHigh,
                    low: newLow,
                    close: newClose,
                };
                candleSeries.update(updatedCandle);
                updateOHLCV(updatedCandle);
            }
            document.getElementById('update-time').innerHTML = `Updated: ${new Date().toLocaleTimeString()}`;
        }

        function setTimeframe(tf, btn) {
            currentInterval = tf;
            document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            loadChart();
        }

        function toggleChartType() {
            if (!chart || !candleSeries) return;
            const currentData = candleSeries.data();
            chart.removeSeries(candleSeries);
            
            if (currentChartType === 'candlestick') {
                candleSeries = chart.addLineSeries({ color: '#00e5ff', lineWidth: 2 });
                currentChartType = 'line';
                document.getElementById('chart-type-btn').innerHTML = '📈 Line Chart';
            } else {
                candleSeries = chart.addCandlestickSeries({
                    upColor: '#00ff88', downColor: '#ff1744',
                    borderUpColor: '#00ff88', borderDownColor: '#ff1744',
                    wickUpColor: '#00ff88', wickDownColor: '#ff1744',
                });
                currentChartType = 'candlestick';
                document.getElementById('chart-type-btn').innerHTML = '📊 Candlestick';
            }
            
            if (currentData && currentData.length > 0) candleSeries.setData(currentData);
            if (volumeSeries) volumeSeries.applyOptions({ priceScaleId: 'volume-scale' });
        }

        function quickPick(symbol) {
            document.getElementById('symbol-input').value = symbol;
            loadChart();
        }

        function showLoading(show) {
            let overlay = document.getElementById('loading-overlay');
            if (show) {
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'loading-overlay';
                    overlay.className = 'loading-overlay';
                    overlay.innerHTML = `<div style="text-align:center"><div class="spinner"></div><div style="color:#4d8099;">Loading chart data...</div></div>`;
                    document.body.appendChild(overlay);
                }
                overlay.style.display = 'flex';
            } else {
                if (overlay) overlay.style.display = 'none';
            }
        }

        // Initialize timeframe buttons
        document.querySelectorAll('.tf-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tf = btn.getAttribute('data-tf');
                setTimeframe(tf, btn);
            });
        });

        // Start everything when page loads
        document.addEventListener('DOMContentLoaded', initChart);
    </script>
</body>
</html>
