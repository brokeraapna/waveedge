<script>
var BACKEND = 'https://waveedgebackflask-kexj.onrender.com';

var now = new Date();
document.getElementById('date-badge').textContent =
  now.toLocaleDateString('en-IN',{weekday:'long',day:'2-digit',month:'short',year:'numeric'});

function renderOverview(waves) {
  if (!waves || !waves.length) { document.getElementById('overview-grid').innerHTML = ''; return; }
  var html = waves.map(function(d) {
    var bc = d.bias === 'bullish' ? 'bull' : d.bias === 'bearish' ? 'bear' : 'neut';
    return '<div class="ov-card">'
      + '<div class="ov-label">' + d.symbol + '</div>'
      + '<div class="ov-val ' + bc + '">' + d.wave + '</div>'
      + '<div style="font-family:var(--mono);font-size:9px;margin-top:4px;color:var(--muted)">' + (d.note||'') + '</div>'
      + '</div>';
  }).join('');
  document.getElementById('overview-grid').innerHTML = html;
}

function renderAnalysis(data) {
  var waves = data.waves || [];
  var analysis = data.analysis || '';
  var support = data.support || [];
  var resistance = data.resistance || [];

  var supHtml = support.map(function(s) {
    return '<div style="font-family:var(--mono);font-size:11px;color:var(--green);margin-bottom:3px;">▸ ' + s.label + ': ' + s.value + '</div>';
  }).join('') || '<div style="color:var(--muted);font-size:11px;font-family:var(--mono);">—</div>';

  var resHtml = resistance.map(function(r) {
    return '<div style="font-family:var(--mono);font-size:11px;color:var(--red);margin-bottom:3px;">▸ ' + r.label + ': ' + r.value + '</div>';
  }).join('') || '<div style="color:var(--muted);font-size:11px;font-family:var(--mono);">—</div>';

  var waveCards = waves.map(function(w) {
    var bc = w.bias === 'bullish' ? 'bull' : w.bias === 'bearish' ? 'bear' : 'neut';
    return '<div class="wave-card">'
      + '<div class="wc-top"><div class="wc-symbol">' + w.symbol + '</div><div class="wc-tf">Daily</div></div>'
      + '<div class="wc-wave-badge ' + bc + '">〰 ' + w.wave + '</div>'
      + '<div class="wc-analysis">' + (w.note||'') + '</div>'
      + '</div>';
  }).join('');

  var mainCard = '<div class="wave-card">'
    + '<div class="sec-hdr" style="margin-top:0;">// ANALYSIS</div>'
    + '<div class="wc-analysis">' + analysis.replace(/\n/g,'<br>') + '</div>'
    + '<div class="wc-levels">'
    + '<div class="level-box"><div class="level-lbl">SUPPORT</div>' + supHtml + '</div>'
    + '<div class="level-box"><div class="level-lbl">RESISTANCE</div>' + resHtml + '</div>'
    + '</div></div>';

  document.getElementById('analysis-cards').innerHTML = waveCards + mainCard;
}

function renderOutlook(waves) {
  if (!waves || !waves.length) {
    document.getElementById('outlook-rows').innerHTML = '<div style="color:var(--muted);font-size:11px;font-family:var(--mono);">No data</div>';
    return;
  }
  var html = waves.map(function(o) {
    var bc = o.bias === 'bullish' ? 'bull' : o.bias === 'bearish' ? 'bear' : 'neut';
    var bl = o.bias === 'bullish' ? 'BULLISH' : o.bias === 'bearish' ? 'BEARISH' : 'NEUTRAL';
    return '<div class="oc-row">'
      + '<span class="oc-sym">' + o.symbol + '</span>'
      + '<span class="oc-wave">' + o.wave + '</span>'
      + '<span class="oc-badge ' + bc + '">' + bl + '</span>'
      + '</div>';
  }).join('');
  document.getElementById('outlook-rows').innerHTML = html;
}

function showError(msg) {
  document.getElementById('analysis-cards').innerHTML =
    '<div style="text-align:center;padding:40px;color:var(--red);font-family:var(--mono);font-size:12px;background:var(--s1);border:1px solid var(--border);border-radius:12px;">⚠ ' + msg + '</div>';
  document.getElementById('outlook-rows').innerHTML =
    '<div style="color:var(--muted);font-size:11px;font-family:var(--mono);">—</div>';
}

fetch(BACKEND + '/wavecounts/latest', {cache:'no-cache'})
  .then(function(r){ return r.json(); })
  .then(function(d){
    if (!d || d.error) {
      showError('No analysis posted yet. Check back after 9 AM IST.');
      return;
    }
    renderOverview(d.waves);
    renderAnalysis(d);
    renderOutlook(d.waves);
    if (d.date) {
      var t = new Date(d.date);
      document.getElementById('update-time').textContent =
        '● Last updated: ' + t.toLocaleString('en-IN') + ' IST · Next update tomorrow 9:00 AM IST';
    }
  })
  .catch(function(e){
    showError('Failed to load analysis. Please refresh.');
    console.error(e);
  });
</script>
